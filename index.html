<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The World of Nymara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div>
        <h1>The World of Nymara</h1>
        <span id="location-count"></span>
      </div>
      <p class="subtitle">Mountainous Rainforest Islands — Campaign Reference</p>
    </header>
    <div id="layout">
      <aside id="sidebar">
        <p class="sidebar-label">Locations</p>
        <div id="city-list"></div>
        <div id="custom-list-section" style="display:none">
          <div class="sidebar-divider"></div>
          <p class="sidebar-label">Custom</p>
          <div id="custom-list"></div>
        </div>
        <div class="sidebar-add">
          <button id="btn-add-location" class="btn-add">+ Add Location</button>
        </div>
      </aside>
      <main id="main-content"></main>
    </div>
  </div>

  <!-- Mobile sidebar backdrop -->
  <div id="sidebar-backdrop"></div>

  <!-- Bottom Hotbar -->
  <div id="hotbar">

    </button>
    <button id="hotbar-combat" class="hotbar-btn" data-page="combat">

    </button>
    <button id="hotbar-magicItems" class="hotbar-btn" data-page="magicItems">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="m176-120-56-56 301-302-181-45 198-123-17-234 179 151 216-88-87 217 151 178-234-16-124 198-45-181-301 301Zm24-520-80-80 80-80 80 80-80 80Zm520 520-80-80 80-80 80 80-80 80Z"/></svg>

    <button id="hotbar-factions" class="hotbar-btn" data-page="factions">

    </button>
    <button id="hotbar-stores" class="hotbar-btn" data-page="stores">

    </button>

    </button>
    <button id="hotbar-settings" class="hotbar-btn" data-page="settings">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm112-260q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Z"/></svg>
    </button>
  </div>

  <!-- New Location Popup -->
  <div id="popup-overlay" class="popup-overlay hidden">
    <div class="popup-card" onclick="event.stopPropagation()">
      <p class="popup-label">Add to Atlas</p>
      <h3 class="popup-title">New Location</h3>
      <p class="popup-desc">What type of location is this?</p>
      <div class="popup-options">
        <button onclick="addCustomLocation('city')" class="popup-option">
          <div class="popup-option-title" style="color:#c8a96e">City / Town / Village</div>
          <div class="popup-option-desc">A settlement with population, shops, factions & lore</div>
        </button>
        <button onclick="addCustomLocation('landmark')" class="popup-option">
          <div class="popup-option-title" style="color:#b07a9e">Landmark / Ruin</div>
          <div class="popup-option-desc">A named place of historical or environmental significance</div>
        </button>
        <button onclick="addCustomLocation('dungeon')" class="popup-option">
          <div class="popup-option-title" style="color:#7a6090">Dungeon</div>
          <div class="popup-option-desc">A dangerous location for adventure — cave, fortress, temple</div>
        </button>
      </div>
      <button onclick="closePopup()" class="popup-cancel">Cancel</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
